name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      # Build all non-web packages
      - run: bun run --filter '!@composio/ao-web' build
      # Typecheck all non-web packages
      - run: bun run --filter '!@composio/ao-web' typecheck
      # Build web (Next.js build includes its own typecheck)
      - run: bun run --filter @composio/ao-web build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - run: bun run --filter '!@composio/ao-web' build
      - run: bun run test

  test-web:
    name: Test (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Start tmux server
        run: tmux start-server
      - run: bun install --frozen-lockfile
      - run: bun run --filter '!@composio/ao-web' build
      - name: Run web server tests (unit + integration)
        run: bunx vitest run server/__tests__/
        working-directory: packages/web
